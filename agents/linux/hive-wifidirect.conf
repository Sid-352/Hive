<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow users in 'netdev' group to access WiFi Direct via wpa_supplicant -->
  <policy group="netdev">
    <!-- Allow sending to wpa_supplicant service -->
    <allow send_destination="fi.w1.wpa_supplicant1"/>
    
    <!-- Allow all wpa_supplicant interfaces -->
    <allow send_interface="fi.w1.wpa_supplicant1"/>
    <allow send_interface="fi.w1.wpa_supplicant1.Interface"/>
    <allow send_interface="fi.w1.wpa_supplicant1.Interface.P2PDevice"/>
    <allow send_interface="fi.w1.wpa_supplicant1.BSS"/>
    <allow send_interface="fi.w1.wpa_supplicant1.Network"/>
    <allow send_interface="fi.w1.wpa_supplicant1.Peer"/>
    <allow send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_interface="org.freedesktop.DBus.Introspectable"/>
    
    <!-- Allow receiving signals from wpa_supplicant -->
    <allow receive_sender="fi.w1.wpa_supplicant1"/>
  </policy>
</busconfig>
