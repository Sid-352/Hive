name: Release Hive

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build and Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --quiet -r requirements.txt pytest psutil

      - name: Setup Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev build-essential

      - name: Setup MSVC Developer Command Prompt
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build agent and bundle
        run: python dist_tools/build.py --skip-tests

      - name: Resolve version and asset name
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          if [ -z "$version" ]; then
            echo "Error: Tag version is empty."
            exit 1
          fi
          
          # Determine OS tag and architecture
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            os_tag="windows"
          else
            os_tag="linux"
          fi
          
          asset_name="Hive-$version-$os_tag-64bit.zip"
          
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "asset=$asset_name" >> $GITHUB_OUTPUT

      - name: Create ZIP archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $asset = "${{ steps.version.outputs.asset }}"
          Compress-Archive -Path "dist/Hive/*" -DestinationPath $asset -Force

      - name: Create ZIP archive (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          asset="${{ steps.version.outputs.asset }}"
          cd dist/Hive && zip -r "../../$asset" . *

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Hive v${{ steps.version.outputs.version }}
          body: |
            Release of Hive v${{ steps.version.outputs.version }}
            
            See the changelog below for details.
          files: ${{ steps.version.outputs.asset }}
          generate_release_notes: true
